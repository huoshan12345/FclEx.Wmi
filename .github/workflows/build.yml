name: Build
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yml
      - '*.sln'
      - '*.slnx'
      - build/pack.ps1
      - build/pkg.version
      - NuGet.Config
      - src/**
      - test/**
  pull_request_target: # use pull_request_target instead of pull_request to let dependabot have permission to access action secrets.
    branches:
      - main

permissions:
  pull-requests: write
  contents: write
  statuses: write
  checks: write
  actions: write

env:
  SOLUTION: FclEx.Wmi.slnx
  DOTNET_NOLOGO: 1
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  MYGET_SOURCE: https://www.myget.org/F/huoshan12345/api/v2/package
  USE_NUGET: true
  USE_MYGET: false
  ARTIFACTS_NAME: nuget-packages
  ARTIFACTS_DIR: ./artifacts/nuget/

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Get PR
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: suzuki-shunsuke/get-pr-action@v0.1.0
        id: pr

      - name: Print variables
        shell: pwsh
        run: |
          echo "merge_commit_sha: ${{ steps.pr.outputs.merge_commit_sha }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.merge_commit_sha }}

      - name: Check missing SDKs
        id: sdk_check
        shell: pwsh
        run: |
          $wanted = @(
            '8.0.x'
            '9.0.x'
            '10.0.x'
          )

          $installed = dotnet --list-sdks

          $missing = foreach ($sdk in $wanted) {
            $prefix = $sdk -replace 'x$', ''
            if (-not ($installed -match "^$([regex]::Escape($prefix))")) {
              $sdk
            }
          }

          $joined = $missing -join "`n"

          "missing<<EOF" >> $env:GITHUB_OUTPUT
          $joined >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

          Write-Host "Missing SDKs: $joined"

      - name: Setup missing SDKs
        if: steps.sdk_check.outputs.missing != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.sdk_check.outputs.missing }}

      - name: NuGet Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Test Release
        run: dotnet test /nr:false -c Release --no-restore ${{ env.SOLUTION }} -v q

      - name: Test Report
        uses: dorny/test-reporter@main
        if: (success() || failure())
        with:
          name: Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          list-suites: failed
          list-tests: failed

      - name: Set version
        id: set_version
        shell: pwsh
        run: |
          $ver = Get-Content -Path ./build/pkg.version
          echo "version=$ver" >> $Env:GITHUB_OUTPUT
          echo $ver

      - name: Pack
        shell: pwsh
        run: >
          dotnet pack ${{ env.SOLUTION }} -v q -c Release --no-restore --no-build `
          --include-symbols -p:SymbolPackageFormat=snupkg -p:PackageVersion=${{ steps.set_version.outputs.version }} `
          -o ${{ env.ARTIFACTS_DIR }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACTS_NAME }}
          path: ${{ env.ARTIFACTS_DIR }}
          
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    needs:
      - build-win

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACTS_NAME }}
          path: ${{ env.ARTIFACTS_DIR }}

      - name: List packages
        shell: bash
        run: |
          echo "Downloaded files:"
          ls -lhR ${{ env.ARTIFACTS_DIR }}

      - name: NuGet Publish
        if: env.USE_NUGET == 'true'
        shell: pwsh
        run: |
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}*.nupkg" `
            --api-key "${{ secrets.NUGET_APIKEY }}" `
            --source "${{ env.NUGET_SOURCE }}" `
            --skip-duplicate

      - name: MyGet Publish
        if: env.USE_MYGET == 'true'
        shell: pwsh
        run: |
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}*.nupkg" `
            --api-key "${{ secrets.MYGET_APIKEY }}" `
            --source "${{ env.MYGET_SOURCE }}" `
            --skip-duplicate

      - name: Set version
        shell: pwsh
        run: |
          $ver = "${{ needs.build.outputs.version }}"
          echo "VERSION=$ver" >> $Env:GITHUB_ENV
          echo $ver

      - name: Create Tag
        uses: huoshan12345/update-tag@v1
        with:
          tag_name: ${{ env.VERSION }}
          update_if_exists: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          token: ${{ secrets.PAT }}
          generateReleaseNotes: true
          skipIfReleaseExists: true
...
