# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ubuntu is required to test with docker services.
# windows is required to publish FclEx.Wmi.
name: Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  DOTNET_NOLOGO: 1
  MYGET_APIKEY: ${{ secrets.MYGET_APIKEY }}
  SOLUTION: FclEx.Wmi.sln
  TEST_PATH: ./test/FclEx.Wmi.Tests

jobs:    
  build-windows:
    runs-on: windows-2019
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            6.0.x
            7.0.x
            8.0.x
            9.0.x

      - name: Test Release
        shell: pwsh
        run: dotnet test ${{ env.TEST_PATH }} -c Release

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: github.actor != 'dependabot-bot' && (success() || failure()) # run this step even if previous step failed
        with:
          name: Test Report              # Name of the check run which will be created 
          path: src/TestResults/**/*.trx # Path to test results
          reporter: dotnet-trx           # Format of test results
          list-suites: failed
          list-tests: failed

      - name: NuGet Publish
        if: ${{ github.ref == 'refs/heads/master' }}
        shell: pwsh
        run: |
          ./build/pack.ps1

      - name: Set variables
        run: |
          $ver = Get-Content -Path ./build/pkg.version
          echo "VERSION=$ver" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
          echo $ver
          
      - name: Create Tag
        if: github.ref == 'refs/heads/master'
        uses: richardsimko/update-tag@v1
        with:
          tag_name: ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true   